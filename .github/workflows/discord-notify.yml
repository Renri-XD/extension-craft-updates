name: Discord New Version Notify
on:
  push:
    branches: [main]
    paths:
      - 'meta.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 新バージョンを検出
        id: check
        run: |
          NEW_VERSION=$(jq -r '.versions[-1].id' meta.json)

          git show HEAD^:meta.json > old_meta.json 2>/dev/null || echo '{"versions":[]}' > old_meta.json

          # 「以前のリストに存在しなかった最新版」だけを新リリース扱いにする。
          # エントリ削除やロールバックでは発火しない(誤アナウンス防止)。
          if jq -e --arg v "$NEW_VERSION" '.versions[] | select(.id == $v)' old_meta.json > /dev/null; then
            echo "new_version_found=false" >> "$GITHUB_OUTPUT"
          else
            echo "new_version_found=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: changelog本文を読み込み
        if: steps.check.outputs.new_version_found == 'true'
        id: changelog
        env:
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          FILE="versions/$VERSION/changelog.txt"
          if [ -f "$FILE" ]; then
            BODY=$(head -c 1800 "$FILE")
          else
            BODY=$(git log -1 --pretty=%B)
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Discordに通知
        if: steps.check.outputs.new_version_found == 'true'
        env:
          VERSION: ${{ steps.check.outputs.version }}
          CHANGELOG: ${{ steps.changelog.outputs.body }}
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PAYLOAD=$(jq -n --arg v "$VERSION" --arg msg "$CHANGELOG" \
            '{content: ("**🎉 ExtensionCraft v" + $v + " がリリースされました！**\n" + $msg)}')
          curl -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"
